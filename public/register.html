<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Create your MoneyTrack account">
    <title>MoneyTrack — Register</title>
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="logo">
                <h1>💰 MoneyTrack</h1>
                <p>Start tracking your finances today</p>
            </div>

            <h2>Create Account</h2>

            <div class="error-msg" id="error-msg"></div>

            <form id="register-form" autocomplete="on">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="you@example.com" required
                        autocomplete="email">
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Min. 6 characters" required
                        minlength="6" autocomplete="new-password">
                </div>

                <div class="form-group">
                    <label for="confirm-password">Confirm Password</label>
                    <input type="password" id="confirm-password" name="confirm-password" placeholder="Re-enter password"
                        required minlength="6" autocomplete="new-password">
                </div>

                <button type="submit" class="btn btn-primary btn-full" id="register-btn">
                    Create Account
                </button>
            </form>

            <div class="auth-footer">
                Already have an account? <a href="/">Sign in</a>
            </div>
        </div>
    </div>

    <script src="/js/auth.js"></script>
</body>

</html>
